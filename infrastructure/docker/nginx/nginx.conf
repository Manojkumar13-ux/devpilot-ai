# DevPilot — Nginx reverse proxy configuration
# Production: place in /etc/nginx/nginx.conf
# Development: docker compose mounts this file

events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  # ─── Basic ───
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout  65;
  keepalive_requests 1000;
  server_tokens off;

  # ─── Rate limiting ───
  limit_req_zone  $binary_remote_addr  zone=api:10m  rate=30r/s;
  limit_req_zone  $binary_remote_addr  zone=auth:10m rate=5r/s;

  # ─── SSL (production — use certbot or ACME) ───
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ─── Logging ───
  log_format json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent"'
  '}';
  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log warn;

  # ─── Upstreams ───
  upstream backend {
    server devpilot-backend:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream frontend {
    server devpilot-frontend:80 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  # ─── HTTP → HTTPS redirect (production) ───
  server {
    listen 80;
    server_name devpilot.example.com;
    return 301 https://$host$request_uri;
  }

  # ─── HTTPS server (production) ───
  server {
    listen 443 ssl http2;
    server_name devpilot.example.com;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # ─── Frontend (SPA) ───
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;

      # SPA fallback — serve index.html for unknown routes
      error_page 404 =200 /index.html;
    }

    # ─── Static assets (cache aggressively) ───
    location /assets/ {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ─── API ───
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ─── Auth (stricter rate limit) ───
    location /auth/ {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 15s;
    }

    # ─── Health (no rate limit) ───
    location /health {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── WebSocket (Monaco editor sync, future) ───
    location /ws/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }
}
