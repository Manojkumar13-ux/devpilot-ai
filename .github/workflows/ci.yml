name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  typecheck-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devpilot
          POSTGRES_PASSWORD: devpilot
          POSTGRES_DB: devpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U devpilot
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @devpilot/backend exec prisma generate
        env:
          DATABASE_URL: postgresql://devpilot:devpilot@localhost:5432/devpilot
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://devpilot:devpilot@localhost:5432/devpilot
          JWT_SECRET: ci-secret
          VITE_BACKEND_URL: http://localhost:4000

  docker-build:
    runs-on: ubuntu-latest
    needs: [typecheck-and-build]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: devpilot/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          tags: devpilot/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker
          build-args: |
            VITE_BACKEND_URL=https://api.devpilot.example.com
      - name: Verify production build
        run: |
          docker images --filter "reference=devpilot/*" --format "{{.Repository}}:{{.Tag}}"
          echo "Docker images built successfully"
