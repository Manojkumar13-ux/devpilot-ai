services:
  postgres:
    image: postgres:16-alpine
    container_name: devpilot-postgres
    environment:
      POSTGRES_USER: devpilot
      POSTGRES_PASSWORD: devpilot
      POSTGRES_DB: devpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpilot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devpilot
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: devpilot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - devpilot
    deploy:
      resources:
        limits:
          memory: 256M

  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
    container_name: devpilot-migrate
    command: >
      sh -c "pnpm --filter @devpilot/backend exec prisma db push && pnpm --filter @devpilot/backend exec prisma db seed"
    environment:
      DATABASE_URL: postgresql://devpilot:devpilot@postgres:5432/devpilot
    depends_on:
      postgres:
        condition: service_healthy
    restart: no
    networks:
      - devpilot

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: devpilot-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://devpilot:devpilot@postgres:5432/devpilot
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      BACKEND_PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN:-https://devpilot.example.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-llama3.2:3b}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://localhost:11434/v1}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devpilot
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://api.devpilot.example.com}
    container_name: devpilot-frontend
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - devpilot
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  nginx:
    image: nginx:alpine
    container_name: devpilot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - devpilot
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:

networks:
  devpilot:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
